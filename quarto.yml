project:
  type: website
  output-dir: _site

website:
  title: "AI-Assisted Software Engineering"
  navbar:
    left:
      - text: Home
        href: index.qmd
      - text: Lectures
        menu:
          - text: Lecture 1
            href: lectures/lecture01.ipynb
          - text: Lecture 2
            href: lectures/lecture02.ipynb
          - text: Lecture 3
            href: lectures/lecture03.ipynb
          - text: Lecture 4
            href: lectures/lecture04.ipynb
          - text: Lecture 5
            href: lectures/lecture05.ipynb
          - text: Lecture 6
            href: lectures/lecture06.ipynb
          - text: Lecture 7
            href: lectures/lecture07.ipynb
          - text: Lecture 8
            href: lectures/lecture08.ipynb
          - text: Lecture 9
            href: lectures/lecture09.ipynb
          - text: Lecture 10
            href: lectures/lecture10.ipynb
          - text: Lecture 11
            href: lectures/lecture11.ipynb
          - text: Lecture 12
            href: lectures/lecture12.ipynb
format:
  html:
    theme: cosmo
  revealjs:
    theme: simple
    slide-number: true
    transition: fade
    toc: true
    chalkboard: true
    code-overflow: wrap
    code-line-numbers: true
    code-copy: true
    highlight-style: github
    embed-resources: true
    width: 1280
    height: 720
    controls: true
    progress: true
    center: true
    navigation-mode: default
    menu: true
    history: true
    pdf: true
    auto-animate: true
    auto-slide: 0
    background-transition: fade
    hash: true
    help: true
    keyboard: true
    overview: true
    pause: true
    showNotes: true
    showSlideNumber: true
    touch: true
    fragments: true
    multiplex: false
    plugins: []
execute:
  enabled: true
  echo: true
  eval: true
  cache: false
  freeze: false
  warning: false
  error: true
  timeout: 60
  kernel: python3

