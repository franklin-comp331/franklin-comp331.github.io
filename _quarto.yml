project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - assignments/lab01_structured_ai_workflow.ipynb
    - assignments/lab02_eval_driven_development.ipynb
    - assignments/lab03_ai_system_implementation.ipynb
    - assignments/lab04_risk_analysis_production_readiness.ipynb
    - assignments/lab05_coding_agents_controlled_workflows.ipynb

website:
  title: "COMP 331: AI-Assisted Software Engineering"
  site-url: "https://t-morgan.github.io/ai-assisted-software-engineering/"
  repo-url: "https://github.com/t-morgan/ai-assisted-software-engineering"
  navbar:
    left:
      - text: Home
        href: index.qmd
      - text: Labs
        menu:
          - text: Lab 1
            href: assignments/lab01_structured_ai_workflow.ipynb
          - text: Lab 2
            href: assignments/lab02_eval_driven_development.ipynb
          - text: Lab 3
            href: assignments/lab03_ai_system_implementation.ipynb
          - text: Lab 4
            href: assignments/lab04_risk_analysis_production_readiness.ipynb
          - text: Lab 5
            href: assignments/lab05_coding_agents_controlled_workflows.ipynb
    right:
      - icon: github
        href: https://github.com/t-morgan/ai-assisted-software-engineering

format:
  html:
    theme: cosmo
    toc: true

execute:
  enabled: false
  echo: true
  eval: true
  cache: false
  freeze: false
  warning: false
  error: true
  timeout: 60
  kernel: python3
